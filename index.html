<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điền Thông Tin Đăng Ký</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .form-card {
            background-color: #1f2937;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 700px;
            border: 1px solid #374151;
        }
        .brand-gradient {
            background: linear-gradient(to right, #3b82f6, #2563eb);
        }
        input[type="checkbox"] {
            accent-color: #3b82f6;
        }
        /* Style cho thông báo thành công */
        #successMessage {
            display: none;
        }
    </style>
</head>
<body>

    <div class="form-card">
        <div id="formContent">
            <h1 class="text-3xl font-bold mb-8 text-white">Điền Thông Tin Đăng Ký</h1>
            
            <!-- 
                SỬ DỤNG TARGET ĐẾN IFRAME ẨN ĐỂ TRÁNH LỖI CORS VÀ CHUYỂN TRANG
            -->
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>
            
            <form id="registrationForm" class="space-y-5" action="https://docs.google.com/forms/d/e/1FAIpQLScT8uxLwoNYhqvdQB6StJEBUUIsX5oCw0j8vAOa6h8XQOx7jg/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Họ và tên *</label>
                        <input type="text" name="entry.1221764722" required class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition" placeholder="Nhập họ và tên">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Số điện thoại (Zalo) *</label>
                        <input type="tel" name="entry.1691132644" required class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition" placeholder="Nhập SĐT">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Email *</label>
                    <input type="email" name="entry.1691375179" required class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition" placeholder="youremail@example.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Lĩnh vực hoạt động</label>
                    <select name="entry.803738090" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition appearance-none cursor-pointer">
                        <option value="">-- Chọn lĩnh vực --</option>
                        <option value="Solopreneur">Solopreneur</option>
                        <option value="Trainer">Trainer</option>
                        <option value="Coach">Coach</option>
                        <option value="SME Owner">SME Owner</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Link LinkedIn Profile (Tùy chọn)</label>
                    <input type="url" name="entry.1018320141" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition" placeholder="https://linkedin.com/in/yourprofile">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Mục tiêu tham gia</label>
                    <div class="space-y-2">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" name="entry.2069722307" value="Xây dựng thương hiệu cá nhân" class="w-5 h-5 rounded border-gray-600 text-blue-500 bg-gray-900">
                            <span class="text-gray-300 group-hover:text-white transition">Xây dựng thương hiệu cá nhân</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" name="entry.2069722307" value="Ứng dụng AI vào công việc" class="w-5 h-5 rounded border-gray-600 text-blue-500 bg-gray-900">
                            <span class="text-gray-300 group-hover:text-white transition">Ứng dụng AI vào công việc</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <input type="checkbox" name="entry.2069722307" value="Mở rộng network" class="w-5 h-5 rounded border-gray-600 text-blue-500 bg-gray-900">
                            <span class="text-gray-300 group-hover:text-white transition">Mở rộng network</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Câu hỏi dành cho diễn giả (Tùy chọn)</label>
                    <textarea name="entry.1119565013" rows="2" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-gray-600 text-white focus:outline-none focus:border-blue-500 transition" placeholder="Bạn muốn hỏi gì..."></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full brand-gradient hover:opacity-90 text-white font-bold text-lg py-4 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 mt-4 uppercase tracking-wider">
                    👉 Xác nhận đăng ký
                </button>
            </form>
        </div>

        <!-- Thông báo thành công -->
        <div id="successMessage" class="text-center py-10">
            <div class="mb-6 flex justify-center">
                <div class="bg-green-500/20 p-4 rounded-full">
                    <svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Đăng ký thành công!</h2>
            <p class="text-gray-400 mb-8">Cảm ơn bạn đã quan tâm. Chúng tôi sẽ liên hệ với bạn sớm nhất có thể.</p>
            <button onclick="location.reload()" class="px-6 py-2 border border-gray-600 rounded-lg hover:bg-gray-700 transition">
                Gửi phản hồi khác
            </button>
        </div>
    </div>

    <script>
        var submitted = false;
        function showSuccess() {
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        }
    </script>

</body>
</html>
